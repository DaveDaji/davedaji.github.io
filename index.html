<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Name</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- LEFT COLUMN: YouTube Shorts -->
    <div class="column video-column">
        
        <div class="video">
            <iframe 
                src="https://www.youtube.com/embed/lyfdle5VJUc"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
            </iframe>
        </div>

        <div class="video">
            <iframe 
                src="https://www.youtube.com/embed/LLdhFBHlo2Y"
                frameborder="0"
                allowfullscreen>
            </iframe>
        </div>

    </div>

    <!-- RIGHT COLUMN: Images & GIFs -->
    <div class="column image-column">

        <div class="media">
            <img src="media/image1.webp" alt="">
        </div>

        <div class="media">
            <img src="media/loop1.gif" alt="">
        </div>

        <div class="media">
            <img src="media/image2.jpg" alt="">
        </div>

    </div>

</div>

</body>
</html>
